<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memories</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      font-size: 14px;
      background: #f5f5f5;
      color: #1a1a1a;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #app { display: flex; flex-direction: column; height: 100vh; }

    /* ── Picker overlay ── */
    .picker-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.4);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    .picker-card {
      background: #fff; border-radius: 8px; padding: 24px; min-width: 320px;
      box-shadow: 0 4px 24px rgba(0,0,0,.2);
    }
    .picker-card h2 { margin-bottom: 16px; }
    .picker-card button {
      display: block; width: 100%; text-align: left;
      padding: 10px 14px; margin-bottom: 8px;
      border: 1px solid #ddd; border-radius: 6px;
      background: #fff; cursor: pointer; font-size: 14px;
    }
    .picker-card button:hover { background: #f0f4ff; }

    /* ── Main layout ── */
    .layout { display: flex; flex: 1; overflow: hidden; }

    /* ── Chat panel ── */
    .chat-panel {
      flex: 2; display: flex; flex-direction: column;
      border-right: 1px solid #ddd;
      min-width: 0;
    }
    .chat-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; background: #fff; border-bottom: 1px solid #ddd;
      font-weight: 600;
    }
    .chat-messages {
      flex: 1; overflow-y: auto;
      padding: 16px; display: flex; flex-direction: column; gap: 12px;
    }
    .msg { max-width: 70%; padding: 10px 14px; border-radius: 12px; line-height: 1.5; }
    .msg.user  { align-self: flex-end; background: #3b5bdb; color: #fff; border-radius: 12px 12px 2px 12px; }
    .msg.assistant { align-self: flex-start; background: #fff; border: 1px solid #ddd; border-radius: 12px 12px 12px 2px; }
    .msg.generating { color: #888; font-style: italic; }
    .msg.contradiction-exhausted { border-color: #faa; }

    .thinking-block {
      align-self: flex-start; max-width: 70%;
      border: 1px solid #e8e0f8; border-radius: 8px; overflow: hidden;
    }
    .thinking-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 12px; background: #f3eeff;
      font-size: 12px; color: #7c5cbf; font-weight: 500; cursor: pointer;
      user-select: none;
    }
    .thinking-header:hover { background: #ebe3ff; }
    .thinking-body {
      padding: 10px 12px; background: #faf8ff;
      font-size: 12px; color: #555; font-style: italic; line-height: 1.6;
      white-space: pre-wrap; max-height: 200px; overflow-y: auto;
    }

    /* ── Notification cards ── */
    .notification-card {
      align-self: flex-start; max-width: 70%;
      border-radius: 8px; overflow: hidden;
      border: 1px solid #ddd;
      font-size: 13px;
    }
    .notification-title {
      padding: 8px 12px; font-weight: 600; font-size: 12px;
    }
    .notification-body { padding: 0 12px 10px; }
    .notification-card.implication { border-color: #f0a040; }
    .notification-card.implication .notification-title { background: #fff8ee; color: #a05000; }
    .notification-card.inference { border-color: #40a080; }
    .notification-card.inference .notification-title { background: #eefff8; color: #006040; }
    .notification-card.contradiction { border-color: #f04040; }
    .notification-card.contradiction .notification-title { background: #fff0ee; color: #a00000; }

    .violation-desc { color: #555; margin: 8px 0 4px; line-height: 1.4; }
    .violation-fact { margin: 4px 0 8px; }
    .violation-fact label { font-size: 12px; color: #888; display: block; margin-bottom: 2px; }
    .violation-fact .fact-key-display {
      font-family: monospace; background: #f5f5f5; padding: 3px 6px;
      border-radius: 3px; margin-right: 4px; font-size: 12px;
    }
    .violation-fact input {
      padding: 4px 8px; border: 1px solid #ddd; border-radius: 4px;
      font-size: 13px; width: 100%; margin-top: 4px;
    }
    .violation-fact input:focus { outline: none; border-color: #3b5bdb; }

    .inference-statement { font-weight: 500; margin: 8px 0 2px; }
    .inference-derivation { color: #777; font-size: 12px; font-style: italic; margin-bottom: 8px; }

    .notification-actions { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
    .btn-accept {
      padding: 4px 12px; background: #2f9e44; color: #fff;
      border: none; border-radius: 4px; cursor: pointer; font-size: 12px;
    }
    .btn-accept:hover { background: #237032; }
    .btn-accept:disabled { background: #aaa; cursor: default; }
    .btn-ignore {
      padding: 4px 12px; background: #fff; color: #555;
      border: 1px solid #ccc; border-radius: 4px; cursor: pointer; font-size: 12px;
    }
    .btn-ignore:hover { background: #f5f5f5; }
    .btn-ignore:disabled { opacity: .5; cursor: default; }

    .chat-input-row {
      display: flex; gap: 8px; padding: 12px 16px;
      background: #fff; border-top: 1px solid #ddd;
    }
    .chat-input-row input {
      flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px;
    }
    .chat-input-row input:focus { outline: none; border-color: #3b5bdb; }
    .chat-input-row button {
      padding: 8px 18px; background: #3b5bdb; color: #fff;
      border: none; border-radius: 6px; cursor: pointer; font-size: 14px;
    }
    .chat-input-row button:disabled { background: #aaa; cursor: default; }

    .think-toggle {
      display: flex; align-items: center; gap: 5px;
      padding: 6px 10px; border: 1px solid #ddd; border-radius: 6px;
      background: #fff; cursor: pointer; font-size: 13px; color: #555;
      white-space: nowrap; user-select: none;
    }
    .think-toggle.active {
      border-color: #7c5cbf; background: #f3eeff; color: #7c5cbf;
    }
    .think-toggle input[type="checkbox"] { display: none; }

    /* ── Facts panel ── */
    .facts-panel {
      flex: 1; display: flex; flex-direction: column;
      background: #fff; min-width: 0;
    }
    .facts-header {
      padding: 12px 16px; font-weight: 600; border-bottom: 1px solid #ddd;
    }
    .facts-list { flex: 1; overflow-y: auto; padding: 12px 16px; }
    .fact-row {
      display: flex; align-items: center; gap: 6px; margin-bottom: 8px;
    }
    .fact-row .fact-key { font-weight: 500; min-width: 80px; font-size: 13px; }
    .fact-row input {
      flex: 1; padding: 4px 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px;
    }
    .fact-row input:focus { outline: none; border-color: #3b5bdb; }
    .fact-row .btn-del {
      padding: 3px 8px; background: #fff; border: 1px solid #faa; color: #c00;
      border-radius: 4px; cursor: pointer; font-size: 12px;
    }
    .fact-row .btn-del:hover { background: #fdd; }
    .fact-row .btn-save {
      padding: 3px 8px; background: #fff; border: 1px solid #adf; color: #06c;
      border-radius: 4px; cursor: pointer; font-size: 12px;
    }

    .add-fact-form { padding: 12px 16px; border-top: 1px solid #ddd; }
    .add-fact-form input {
      width: 100%; padding: 6px 10px; margin-bottom: 6px;
      border: 1px solid #ddd; border-radius: 4px; font-size: 13px;
    }
    .add-fact-form input:focus { outline: none; border-color: #3b5bdb; }
    .add-fact-form button {
      width: 100%; padding: 7px; background: #3b5bdb; color: #fff;
      border: none; border-radius: 4px; cursor: pointer; font-size: 13px;
    }
    .add-fact-form button:hover { background: #2f4cc0; }

    .facts-footer { padding: 12px 16px; border-top: 1px solid #ddd; }
    .btn-end {
      width: 100%; padding: 7px; background: #fff; color: #c00;
      border: 1px solid #faa; border-radius: 4px; cursor: pointer; font-size: 13px;
    }
    .btn-end:hover { background: #fdd; }
    .btn-end:disabled { opacity: .5; cursor: default; }

    .error-msg { color: #c00; font-size: 12px; margin-top: 4px; }
  </style>
</head>
<body>
<div id="app">

  <!-- Character picker -->
  <div v-if="showPicker" class="picker-overlay">
    <div class="picker-card">
      <h2>Choose a character</h2>
      <button v-for="ch in characters" :key="ch.id" @click="pickCharacter(ch)">
        {{ ch.name }} <small style="color:#888">({{ ch.modelfile_base }})</small>
      </button>
      <p v-if="characters.length === 0" style="color:#888">No characters found.</p>
    </div>
  </div>

  <!-- Main UI -->
  <div v-else class="layout">

    <!-- Chat -->
    <div class="chat-panel">
      <div class="chat-header">
        <span>{{ currentCharacter?.name ?? 'Chat' }}</span>
        <span style="font-size:18px;cursor:pointer" title="Session ended" v-if="sessionEnded">🔒</span>
      </div>
      <div class="chat-messages" ref="messagesEl">
        <template v-for="(msg, i) in messages" :key="i">

          <!-- Thinking block -->
          <div v-if="msg.role === 'thinking'" class="thinking-block">
            <div class="thinking-header" @click="msg._open = !msg._open">
              <span>&#129504; Thinking</span>
              <span>{{ msg._open ? '▲' : '▼' }}</span>
            </div>
            <div v-if="msg._open" class="thinking-body">{{ msg.content }}</div>
          </div>

          <!-- User / assistant messages -->
          <div v-else-if="msg.role === 'user' || msg.role === 'assistant'"
               :class="['msg', msg.role, msg.contradictionExhausted ? 'contradiction-exhausted' : '']">
            {{ msg.content }}
            <div v-if="msg.contradictionExhausted"
                 style="font-size:11px;color:#c55;margin-top:4px">
              ⚠ Max contradiction retries reached — response may not be fully grounded.
            </div>
          </div>

          <!-- Implication notification -->
          <div v-else-if="msg.role === 'notification' && msg.scType === 'implication'"
               class="notification-card implication">
            <div class="notification-title">🔍 New detail implied by character</div>
            <div class="notification-body">
              <div v-for="(v, vi) in msg.violations" :key="vi">
                <p class="violation-desc">{{ v.description }}</p>
                <div v-if="v.suggested_fact" class="violation-fact">
                  <label>Suggested fact</label>
                  <span class="fact-key-display">{{ v.suggested_fact.key }}</span>
                  <input v-model="v._editValue" :placeholder="v.suggested_fact.value" />
                </div>
                <div class="notification-actions">
                  <button v-if="v.suggested_fact"
                          class="btn-accept"
                          :disabled="msg._loading"
                          @click="acceptImplication(msg, v)">
                    {{ msg._loading ? 'Working…' : 'Accept & add fact' }}
                  </button>
                  <button class="btn-ignore"
                          :disabled="msg._loading"
                          @click="ignoreImplication(msg)">
                    Ignore
                  </button>
                </div>
              </div>
            </div>
          </div>

          <!-- Probabilistic inference notification -->
          <div v-else-if="msg.role === 'notification' && msg.scType === 'new_inference_probabilistic'"
               class="notification-card inference">
            <div class="notification-title">💡 New inference (probabilistic)</div>
            <div class="notification-body">
              <div v-for="(inf, ii) in msg.new_inferences" :key="ii">
                <p class="inference-statement">{{ inf.statement }}</p>
                <p class="inference-derivation">{{ inf.derivation }}</p>
                <div class="notification-actions">
                  <button class="btn-accept"
                          :disabled="msg._loading"
                          @click="acceptInference(msg, inf)">
                    {{ msg._loading ? 'Saving…' : 'Accept inference' }}
                  </button>
                  <button class="btn-ignore"
                          :disabled="msg._loading"
                          @click="ignoreInference(msg)">
                    Ignore
                  </button>
                </div>
              </div>
            </div>
          </div>

          <!-- Contradiction notification (informational) -->
          <div v-else-if="msg.role === 'notification' && msg.scType === 'contradiction'"
               class="notification-card contradiction">
            <div class="notification-title">⚡ Contradiction detected (attempt {{ msg.iteration }}) — response regenerated</div>
            <div class="notification-body">
              <p class="violation-desc">{{ msg.description }}</p>
              <div class="notification-actions">
                <button class="btn-ignore" @click="dismissNotification(msg)">Dismiss</button>
              </div>
            </div>
          </div>

        </template>

        <div v-if="generating" class="msg generating">{{ statusText || 'Thinking…' }}</div>
      </div>
      <div class="chat-input-row">
        <input
          v-model="inputText"
          placeholder="Type a message…"
          :disabled="sending || sessionEnded"
          @keyup.enter="sendMessage"
          ref="inputEl"
        />
        <label :class="['think-toggle', { active: thinkEnabled }]" title="Toggle model thinking">
          <input type="checkbox" v-model="thinkEnabled" />
          &#129504; Think
        </label>
        <button :disabled="sending || sessionEnded || !inputText.trim()" @click="sendMessage">
          {{ sending ? '…' : 'Send' }}
        </button>
      </div>
    </div>

    <!-- Facts sidebar -->
    <div class="facts-panel">
      <div class="facts-header">Facts</div>
      <div class="facts-list">
        <div v-for="fact in facts" :key="fact.id" class="fact-row">
          <span class="fact-key">{{ fact.key }}</span>
          <input
            v-model="fact._editValue"
            @keyup.enter="saveFact(fact)"
            :title="fact.key"
          />
          <button class="btn-save" @click="saveFact(fact)" title="Save">✓</button>
          <button class="btn-del" @click="deleteFact(fact)" title="Delete">✕</button>
        </div>
        <p v-if="facts.length === 0" style="color:#aaa;font-size:13px">No facts yet.</p>
      </div>
      <div class="add-fact-form">
        <input v-model="newKey" placeholder="key" />
        <input v-model="newValue" placeholder="value" @keyup.enter="addFact" />
        <button @click="addFact">+ Add Fact</button>
        <p v-if="factError" class="error-msg">{{ factError }}</p>
      </div>
      <div class="facts-footer">
        <button class="btn-end" :disabled="sessionEnded" @click="endSession">
          {{ sessionEnded ? 'Session ended' : 'End Session' }}
        </button>
      </div>
    </div>

  </div>
</div>

<script>
const { createApp, ref, nextTick } = Vue;

createApp({
  setup() {
    const showPicker = ref(true);
    const characters = ref([]);
    const currentCharacter = ref(null);
    const sessionId = ref(null);
    const messages = ref([]);
    const facts = ref([]);
    const inputText = ref('');
    const sending = ref(false);
    const generating = ref(false);
    const statusText = ref('');
    const sessionEnded = ref(false);
    const thinkEnabled = ref(false);
    const newKey = ref('');
    const newValue = ref('');
    const factError = ref('');
    const messagesEl = ref(null);
    const inputEl = ref(null);

    async function loadCharacters() {
      const r = await fetch('/api/characters/');
      characters.value = await r.json();
      if (characters.value.length === 1) {
        pickCharacter(characters.value[0]);
      }
    }

    async function pickCharacter(ch) {
      currentCharacter.value = ch;
      const r = await fetch('/api/sessions/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ character_id: ch.id }),
      });
      const sess = await r.json();
      sessionId.value = sess.id;
      showPicker.value = false;
      await loadFacts();
      nextTick(() => inputEl.value?.focus());
    }

    async function loadFacts() {
      if (!currentCharacter.value) return;
      const r = await fetch(`/api/characters/${currentCharacter.value.id}/facts`);
      const raw = await r.json();
      facts.value = raw.map(f => ({ ...f, _editValue: f.value }));
    }

    async function addFact() {
      factError.value = '';
      if (!newKey.value.trim() || !newValue.value.trim()) return;
      const r = await fetch(`/api/characters/${currentCharacter.value.id}/facts`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ key: newKey.value.trim(), value: newValue.value.trim() }),
      });
      if (r.status === 409) {
        factError.value = `Fact '${newKey.value}' already exists.`;
        return;
      }
      newKey.value = '';
      newValue.value = '';
      await loadFacts();
    }

    async function saveFact(fact) {
      await fetch(`/api/characters/${currentCharacter.value.id}/facts/${fact.key}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ value: fact._editValue }),
      });
      await loadFacts();
    }

    async function deleteFact(fact) {
      await fetch(`/api/characters/${currentCharacter.value.id}/facts/${fact.key}`, {
        method: 'DELETE',
      });
      await loadFacts();
    }

    async function endSession() {
      await fetch(`/api/sessions/${sessionId.value}/end`, { method: 'POST' });
      sessionEnded.value = true;
    }

    // ── Notification actions ──

    async function acceptImplication(notif, violation) {
      if (!violation.suggested_fact) return;
      notif._loading = true;
      const value = violation._editValue ?? violation.suggested_fact.value;
      try {
        const r = await fetch(
          `/api/sessions/${sessionId.value}/turns/${notif.turn_id}/accept-implication`,
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ key: violation.suggested_fact.key, value }),
          }
        );
        if (r.ok) {
          const data = await r.json();
          const assistantMsg = messages.value.find(
            m => m.role === 'assistant' && m.turn_id === notif.turn_id
          );
          if (assistantMsg) assistantMsg.content = data.content;
          dismissNotification(notif);
          await loadFacts();
        }
      } finally {
        notif._loading = false;
      }
    }

    async function ignoreImplication(notif) {
      await fetch(
        `/api/sessions/${sessionId.value}/turns/${notif.turn_id}/ignore-implication`,
        { method: 'POST' }
      );
      dismissNotification(notif);
    }

    async function acceptInference(notif, inference) {
      notif._loading = true;
      try {
        const r = await fetch(
          `/api/sessions/${sessionId.value}/turns/${notif.turn_id}/accept-inference`,
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              statement: inference.statement,
              derivation: inference.derivation,
              source_fact_ids: inference.source_fact_ids || [],
              inference_type: inference.inference_type || 'probabilistic',
            }),
          }
        );
        if (r.ok) dismissNotification(notif);
      } finally {
        notif._loading = false;
      }
    }

    async function ignoreInference(notif) {
      await fetch(
        `/api/sessions/${sessionId.value}/turns/${notif.turn_id}/ignore-inference`,
        { method: 'POST' }
      );
      dismissNotification(notif);
    }

    function dismissNotification(notif) {
      const idx = messages.value.indexOf(notif);
      if (idx !== -1) messages.value.splice(idx, 1);
    }

    // ── Chat ──

    async function sendMessage() {
      const text = inputText.value.trim();
      if (!text || sending.value || sessionEnded.value) return;
      inputText.value = '';
      sending.value = true;
      generating.value = true;
      statusText.value = 'Generating response…';
      messages.value.push({ role: 'user', content: text });
      await scrollToBottom();

      try {
        const response = await fetch(`/api/sessions/${sessionId.value}/messages`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content: text, think: thinkEnabled.value }),
        });

        if (!response.ok) {
          messages.value.push({ role: 'assistant', content: `[Error ${response.status}]` });
          return;
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });

          const blocks = buffer.split('\n\n');
          buffer = blocks.pop() ?? '';

          for (const block of blocks) {
            const lines = block.split('\n');
            let eventName = '';
            let dataStr = '';
            for (const line of lines) {
              if (line.startsWith('event: ')) eventName = line.slice(7);
              if (line.startsWith('data: ')) dataStr = line.slice(6);
            }

            if (eventName === 'status' && dataStr) {
              const payload = JSON.parse(dataStr);
              if (payload.state === 'generating') statusText.value = 'Generating response…';
              else if (payload.state === 'reviewing') statusText.value = 'Reviewing against facts…';
              else if (payload.state === 'regenerating') statusText.value = 'Regenerating (contradiction found)…';

            } else if (eventName === 'thinking' && dataStr) {
              const payload = JSON.parse(dataStr);
              generating.value = false;
              messages.value.push({ role: 'thinking', content: payload.content, _open: false });
              await scrollToBottom();

            } else if (eventName === 'message' && dataStr) {
              const payload = JSON.parse(dataStr);
              generating.value = false;
              statusText.value = '';
              messages.value.push({
                role: 'assistant',
                content: payload.content,
                turn_id: payload.turn_id,
                contradictionExhausted: payload.contradiction_exhausted || false,
              });
              await scrollToBottom();

            } else if (eventName === 'sidechannel' && dataStr) {
              const payload = JSON.parse(dataStr);
              if (payload.type === 'implication') {
                // Initialise _editValue for each violation's suggested fact
                const violations = (payload.violations || []).map(v => ({
                  ...v,
                  _editValue: v.suggested_fact?.value ?? '',
                }));
                messages.value.push({
                  role: 'notification',
                  scType: 'implication',
                  turn_id: payload.turn_id,
                  violations,
                  _loading: false,
                });
                await scrollToBottom();
              } else if (payload.type === 'new_inference_probabilistic') {
                messages.value.push({
                  role: 'notification',
                  scType: 'new_inference_probabilistic',
                  turn_id: payload.turn_id,
                  new_inferences: payload.new_inferences || [],
                  _loading: false,
                });
                await scrollToBottom();
              } else if (payload.type === 'contradiction') {
                messages.value.push({
                  role: 'notification',
                  scType: 'contradiction',
                  iteration: payload.iteration,
                  description: payload.description,
                });
                await scrollToBottom();
              }
            }
          }
        }
      } finally {
        generating.value = false;
        statusText.value = '';
        sending.value = false;
        await nextTick();
        inputEl.value?.focus();
      }
    }

    async function scrollToBottom() {
      await nextTick();
      if (messagesEl.value) {
        messagesEl.value.scrollTop = messagesEl.value.scrollHeight;
      }
    }

    loadCharacters();

    return {
      showPicker, characters, currentCharacter, sessionId,
